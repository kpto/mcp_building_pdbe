[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "pdbe-fastmcp"
version = "0.1.0"
description = "A small FastMCP server for selected PDBe v2 API endpoints."
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=2.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
pdbe-mcp = "server:main"

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-httpx>=0.30.0",
]

[tool.setuptools]
py-modules = ["server"]
packages = ["pdbe"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
